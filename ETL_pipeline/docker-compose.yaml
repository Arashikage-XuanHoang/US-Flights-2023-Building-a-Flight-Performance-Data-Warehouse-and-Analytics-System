services:
  postgres:   # Đây là tên mặc định để kết nối tới postgres nếu không phải thông qua localhost (host: postgres)
    image: postgres:15
    container_name: usflights_psql1
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
    # service postgres sử dụng volume có tên postgres-data-volume để lưu dữ liệu.
      - postgres-data-volume:/var/lib/postgresql/data
    ports:
      - 5440:5432 # Chỉnh sửa port phù hợp
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]    
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

volumes:
  postgres-data-volume:

